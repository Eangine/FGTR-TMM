<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="920" viewBox="0 0 2200 920">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .main-title { font: 700 35px "Times New Roman", Times, serif; fill: #111; }
      .panel-title { font: 700 27px "Times New Roman", Times, serif; fill: #111; }
      .sub-title { font: 700 22px "Times New Roman", Times, serif; fill: #111; }
      .label { font: 700 19px "Times New Roman", Times, serif; fill: #111; }
      .txt { font: 500 17px "Times New Roman", Times, serif; fill: #111; }
      .small { font: 500 15px "Times New Roman", Times, serif; fill: #222; }
      .tiny { font: 500 13px "Times New Roman", Times, serif; fill: #333; }
      .math { font: italic 600 18px "Times New Roman", Times, serif; fill: #111; }
      .red-panel { fill: #fffefe; stroke: #dd2929; stroke-width: 3.0; rx: 24; }
      .gray-dash { fill: #fafafa; stroke: #8c8c8c; stroke-width: 2.6; stroke-dasharray: 13 10; rx: 22; }
      .pink-dash { fill: #fff6fb; stroke: #ef9dcc; stroke-width: 2.4; stroke-dasharray: 10 8; rx: 18; }
      .cyan-dash { fill: #f4fdff; stroke: #64c7dd; stroke-width: 2.4; stroke-dasharray: 10 8; rx: 18; }
      .yellow-box { fill: #fff0a9; stroke: #b28b1c; stroke-width: 2.5; rx: 14; }
      .green-box { fill: #dcf3ce; stroke: #6fa14f; stroke-width: 2.5; rx: 14; }
      .cyan-box { fill: #d9fbfb; stroke: #57a9a6; stroke-width: 2.5; rx: 14; }
      .pink-box { fill: #ffe0ef; stroke: #ef78a9; stroke-width: 2.5; rx: 14; }
      .orange-box { fill: #ffe4c6; stroke: #d6812f; stroke-width: 2.5; rx: 14; }
      .blue-box { fill: #dce9ff; stroke: #6b91d6; stroke-width: 2.5; rx: 14; }
      .white-box { fill: #fff; stroke: #111; stroke-width: 2.4; rx: 10; }
      .soft-box { fill: #fff; stroke: #a4a4a4; stroke-width: 2.2; rx: 12; }
      .arrow { fill: none; stroke: #111; stroke-width: 3.2; marker-end: url(#arrow); }
      .arrow-gray { fill: none; stroke: #777; stroke-width: 2.8; marker-end: url(#arrow-gray); }
      .arrow-red { fill: none; stroke: #dd2929; stroke-width: 3.1; marker-end: url(#arrow-red); }
      .arrow-blue { fill: none; stroke: #267bb8; stroke-width: 3.1; marker-end: url(#arrow-blue); }
      .dash-arrow { stroke-dasharray: 8 7; }
      .brace { fill: none; stroke: #111; stroke-width: 2.4; }
      .token-blue { fill: #ccecff; stroke: #16a8e0; stroke-width: 2.2; rx: 7; }
      .token-pink { fill: #ffd8e7; stroke: #ef78a9; stroke-width: 2.2; rx: 7; }
      .token-yellow { fill: #fff0a9; stroke: #b28b1c; stroke-width: 2.2; rx: 7; }
      .token-green { fill: #dcf3ce; stroke: #6fa14f; stroke-width: 2.2; rx: 7; }
      .node-o { fill: #ffd0a4; stroke: #c96b2c; stroke-width: 2; }
      .node-b { fill: #bed0ff; stroke: #5579c7; stroke-width: 2; }
      .node-g { fill: #caefbd; stroke: #4c934d; stroke-width: 2; }
      .node-r { fill: #ffb1b1; stroke: #d13a37; stroke-width: 2; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#777"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dd2929"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#267bb8"/>
    </marker>
  </defs>

  <rect class="page" x="0" y="0" width="2200" height="920"/>

  <!-- top module labels -->
  <rect x="55" y="38" width="300" height="52" fill="#ffe2e3"/>
  <text class="main-title" x="77" y="74">Feature Encoder</text>
  <rect x="390" y="38" width="520" height="52" fill="#ffe2e3"/>
  <text class="main-title" x="420" y="74">Noise-aware Association Discovery</text>
  <rect x="950" y="38" width="500" height="52" fill="#ffe2e3"/>
  <text class="main-title" x="984" y="74">High-Confidence Memory</text>
  <rect x="1490" y="38" width="620" height="52" fill="#ffe2e3"/>
  <text class="main-title" x="1520" y="74">Prototype Rectification and Optimization</text>

  <!-- Panel A: encoder -->
  <rect class="red-panel" x="50" y="104" width="320" height="730"/>
  <text class="panel-title" x="84" y="145">(a) Noisy Image-Text Pair</text>

  <!-- image icon -->
  <rect x="92" y="172" width="210" height="135" fill="#d9edf8" stroke="#111" stroke-width="2"/>
  <rect x="92" y="172" width="70" height="45" fill="#a8d2ef" stroke="#fff" stroke-width="2"/>
  <rect x="162" y="172" width="70" height="45" fill="#bfe5a9" stroke="#fff" stroke-width="2"/>
  <rect x="232" y="172" width="70" height="45" fill="#d9c67e" stroke="#fff" stroke-width="2"/>
  <rect x="92" y="217" width="70" height="45" fill="#6fb46b" stroke="#fff" stroke-width="2"/>
  <rect x="162" y="217" width="70" height="45" fill="#bb8b64" stroke="#fff" stroke-width="2"/>
  <rect x="232" y="217" width="70" height="45" fill="#86bd75" stroke="#fff" stroke-width="2"/>
  <rect x="92" y="262" width="70" height="45" fill="#e2d17e" stroke="#fff" stroke-width="2"/>
  <rect x="162" y="262" width="70" height="45" fill="#d78d52" stroke="#fff" stroke-width="2"/>
  <rect x="232" y="262" width="70" height="45" fill="#75a36a" stroke="#fff" stroke-width="2"/>
  <path d="M150 271 C169 228 221 224 244 272" fill="#9b5d38" opacity="0.8"/>
  <circle cx="191" cy="236" r="23" fill="#b76b43"/>
  <text class="label" x="126" y="337">Image</text>

  <!-- text icon -->
  <rect class="white-box" x="88" y="385" width="218" height="112"/>
  <text class="txt" x="111" y="421">A dog is</text>
  <text class="txt" x="111" y="450">wearing a hat</text>
  <text class="txt" x="111" y="479">on the grass.</text>
  <text class="label" x="130" y="532">Noisy Text</text>

  <!-- patch and word tokens -->
  <path class="arrow-gray" d="M197 345 L197 376"/>
  <g transform="translate(74,575)">
    <text class="sub-title" x="35" y="0">Tokenization</text>
    <rect class="token-blue" x="0" y="28" width="48" height="42"/>
    <rect class="token-blue" x="54" y="28" width="48" height="42"/>
    <rect class="token-blue" x="108" y="28" width="48" height="42"/>
    <rect class="token-blue" x="162" y="28" width="48" height="42"/>
    <text class="small" x="42" y="96">patch tokens</text>
    <rect class="token-pink" x="0" y="126" width="48" height="42"/>
    <rect class="token-pink" x="54" y="126" width="48" height="42"/>
    <rect class="token-pink" x="108" y="126" width="48" height="42"/>
    <rect class="token-pink" x="162" y="126" width="48" height="42"/>
    <text class="small" x="47" y="194">word tokens</text>
  </g>
  <path class="arrow-gray" d="M197 538 L197 594"/>

  <!-- encoder wedges -->
  <polygon points="390,208 525,150 525,266" fill="#ffe4c6" stroke="#111" stroke-width="3"/>
  <text class="sub-title" x="420" y="205">Image</text>
  <text class="sub-title" x="419" y="233">Encoder</text>
  <polygon points="390,402 525,344 525,460" fill="#dce9ff" stroke="#111" stroke-width="3"/>
  <text class="sub-title" x="423" y="399">Text</text>
  <text class="sub-title" x="417" y="427">Encoder</text>
  <path class="arrow" d="M302 240 L389 208"/>
  <path class="arrow" d="M306 443 L389 402"/>

  <!-- encoded nodes -->
  <g transform="translate(560,132)">
    <ellipse cx="95" cy="80" rx="88" ry="68" fill="#fff" stroke="#111" stroke-width="2" stroke-dasharray="9 6"/>
    <circle class="node-o" cx="58" cy="55" r="11"/>
    <circle class="node-o" cx="92" cy="38" r="11"/>
    <circle class="node-o" cx="125" cy="56" r="11"/>
    <circle class="node-o" cx="55" cy="98" r="11"/>
    <circle class="node-o" cx="94" cy="88" r="11"/>
    <circle class="node-o" cx="134" cy="103" r="11"/>
    <path d="M58 55 L92 38 L125 56 M55 98 L94 88 L134 103 M92 38 L94 88" stroke="#777" stroke-width="2"/>
    <text class="math" x="58" y="172">v_i, P_i</text>
  </g>
  <g transform="translate(560,326)">
    <ellipse cx="95" cy="80" rx="88" ry="68" fill="#fff" stroke="#111" stroke-width="2" stroke-dasharray="9 6"/>
    <circle class="node-b" cx="58" cy="55" r="11"/>
    <circle class="node-b" cx="92" cy="38" r="11"/>
    <circle class="node-b" cx="125" cy="56" r="11"/>
    <circle class="node-b" cx="55" cy="98" r="11"/>
    <circle class="node-b" cx="94" cy="88" r="11"/>
    <circle class="node-b" cx="134" cy="103" r="11"/>
    <path d="M58 55 L92 38 L125 56 M55 98 L94 88 L134 103 M92 38 L94 88" stroke="#777" stroke-width="2"/>
    <text class="math" x="58" y="172">t_i, W_i</text>
  </g>
  <path class="arrow" d="M525 208 L560 212"/>
  <path class="arrow" d="M525 402 L560 406"/>

  <!-- Panel B: association discovery -->
  <rect class="red-panel" x="720" y="104" width="455" height="352"/>
  <text class="panel-title" x="760" y="145">(b) Clean/Noisy Association Discovery</text>
  <rect class="gray-dash" x="755" y="168" width="382" height="252"/>

  <text class="sub-title" x="812" y="206">Per-sample Loss Modeling</text>
  <path d="M795 345 C840 240 890 245 928 344" fill="none" stroke="#3b87bd" stroke-width="4"/>
  <path d="M910 344 C962 208 1045 222 1092 344" fill="none" stroke="#d8534f" stroke-width="4"/>
  <line x1="790" y1="344" x2="1102" y2="344" stroke="#111" stroke-width="2"/>
  <line x1="790" y1="344" x2="790" y2="236" stroke="#111" stroke-width="2"/>
  <text class="tiny" x="825" y="368">low loss</text>
  <text class="tiny" x="1010" y="368">high loss</text>
  <text class="tiny" x="830" y="263" fill="#3b87bd">clean GMM</text>
  <text class="tiny" x="1008" y="247" fill="#d8534f">noisy GMM</text>
  <line x1="930" y1="228" x2="930" y2="360" stroke="#111" stroke-width="2" stroke-dasharray="7 6"/>
  <text class="math" x="945" y="232">threshold tau_gmm</text>
  <rect class="yellow-box" x="840" y="386" width="220" height="42"/>
  <text class="label" x="872" y="413">p_i and label_hat_i</text>

  <path class="arrow" d="M670 212 C690 212 700 238 719 238"/>
  <path class="arrow" d="M670 406 C694 406 698 330 719 330"/>

  <!-- split arrows -->
  <path class="arrow-blue" d="M1175 230 C1225 210 1238 202 1284 202"/>
  <path class="arrow-red" d="M1175 355 C1228 392 1245 515 1295 560"/>
  <text class="small" x="1195" y="202">clean candidates</text>
  <text class="small" x="1193" y="405">noisy samples</text>

  <!-- Panel C memory -->
  <rect class="red-panel" x="1285" y="104" width="430" height="352"/>
  <text class="panel-title" x="1324" y="145">(c) Elitist Cross-Model Memory</text>
  <rect class="cyan-dash" x="1320" y="170" width="360" height="112"/>
  <text class="sub-title" x="1350" y="207">High-Confidence Filtering</text>
  <text class="math" x="1350" y="238">tau_dyn = mean(p_i | clean)</text>
  <text class="math" x="1350" y="265">elite: p_i &gt; tau_dyn + delta</text>

  <rect class="green-box" x="1320" y="309" width="360" height="92"/>
  <text class="sub-title" x="1358" y="340">FIFO Memory Bank Q</text>
  <g transform="translate(1358,356)">
    <rect class="token-green" x="0" y="0" width="42" height="32"/>
    <rect class="token-green" x="48" y="0" width="42" height="32"/>
    <rect class="token-green" x="96" y="0" width="42" height="32"/>
    <rect class="token-green" x="144" y="0" width="42" height="32"/>
    <rect class="token-green" x="192" y="0" width="42" height="32"/>
    <rect class="token-green" x="240" y="0" width="42" height="32"/>
    <text class="tiny" x="15" y="22">e</text>
    <text class="tiny" x="63" y="22">e</text>
    <text class="tiny" x="111" y="22">e</text>
    <text class="tiny" x="159" y="22">...</text>
    <text class="tiny" x="207" y="22">e</text>
    <text class="tiny" x="255" y="22">e</text>
  </g>
  <text class="small" x="1346" y="430">detach embeddings, update by rolling queue</text>
  <path class="arrow-blue" d="M1445 282 L1445 308"/>

  <!-- Panel D rectification -->
  <rect class="red-panel" x="1748" y="104" width="390" height="352"/>
  <text class="panel-title" x="1784" y="145">(d) Prototype Rectification</text>
  <rect class="gray-dash" x="1788" y="172" width="310" height="92"/>
  <text class="sub-title" x="1824" y="207">Prototype Retriever</text>
  <text class="math" x="1812" y="238">top-k sim(v_i, Q)</text>
  <g transform="translate(1868,276)">
    <rect class="token-yellow" x="0" y="0" width="42" height="42"/>
    <rect class="token-yellow" x="48" y="0" width="42" height="42"/>
    <rect class="token-yellow" x="96" y="0" width="42" height="42"/>
    <text class="tiny" x="6" y="67">prototype texts</text>
  </g>
  <rect class="pink-dash" x="1788" y="352" width="310" height="76"/>
  <text class="sub-title" x="1815" y="392">Confidence-weighted</text>
  <text class="sub-title" x="1846" y="418">Noisy Text y_i*</text>
  <path class="arrow" d="M1680 355 C1726 330 1742 236 1787 236"/>
  <path class="arrow-red dash-arrow" d="M1715 355 C1760 355 1775 312 1867 312"/>
  <path class="arrow" d="M1940 318 L1940 351"/>

  <!-- Bottom detailed modules -->
  <rect class="red-panel" x="390" y="500" width="760" height="332"/>
  <text class="panel-title" x="426" y="540">(e) Token Reliability Calibration</text>
  <rect class="pink-dash" x="430" y="565" width="690" height="230"/>
  <text class="sub-title" x="596" y="600">Patch-Token Semantic Support</text>
  <g transform="translate(470,628)">
    <text class="label" x="0" y="-12">visual patches</text>
    <rect class="token-blue" x="0" y="0" width="36" height="34"/>
    <rect class="token-blue" x="42" y="0" width="36" height="34"/>
    <rect class="token-blue" x="84" y="0" width="36" height="34"/>
    <rect class="token-blue" x="126" y="0" width="36" height="34"/>
    <rect class="token-blue" x="0" y="40" width="36" height="34"/>
    <rect class="token-blue" x="42" y="40" width="36" height="34"/>
    <rect class="token-blue" x="84" y="40" width="36" height="34"/>
    <rect class="token-blue" x="126" y="40" width="36" height="34"/>
  </g>
  <g transform="translate(470,735)">
    <text class="label" x="0" y="-12">word tokens</text>
    <rect class="token-pink" x="0" y="0" width="36" height="34"/>
    <rect class="token-pink" x="42" y="0" width="36" height="34"/>
    <rect class="token-pink" x="84" y="0" width="36" height="34"/>
    <rect class="token-pink" x="126" y="0" width="36" height="34"/>
  </g>
  <rect class="soft-box" x="708" y="635" width="172" height="58"/>
  <text class="sub-title" x="742" y="670">max sim</text>
  <rect class="soft-box" x="708" y="724" width="172" height="58"/>
  <text class="sub-title" x="724" y="758">weighted pool</text>
  <path class="arrow" d="M645 675 L707 665"/>
  <path class="arrow" d="M645 752 L707 752"/>
  <path class="arrow" d="M880 665 L960 665"/>
  <path class="arrow" d="M880 752 L960 752"/>
  <g transform="translate(962,625)">
    <rect x="0" y="0" width="112" height="112" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="0" y="0" width="28" height="28" fill="#f2f2f2"/>
    <rect x="28" y="0" width="28" height="28" fill="#e1e1e1"/>
    <rect x="56" y="0" width="28" height="28" fill="#a9a9a9"/>
    <rect x="84" y="0" width="28" height="28" fill="#d2d2d2"/>
    <rect x="0" y="28" width="28" height="28" fill="#c0c0c0"/>
    <rect x="28" y="28" width="28" height="28" fill="#777"/>
    <rect x="56" y="28" width="28" height="28" fill="#dfdfdf"/>
    <rect x="84" y="28" width="28" height="28" fill="#b9b9b9"/>
    <rect x="0" y="56" width="28" height="28" fill="#ececec"/>
    <rect x="28" y="56" width="28" height="28" fill="#bdbdbd"/>
    <rect x="56" y="56" width="28" height="28" fill="#555"/>
    <rect x="84" y="56" width="28" height="28" fill="#dedede"/>
    <rect x="0" y="84" width="28" height="28" fill="#d0d0d0"/>
    <rect x="28" y="84" width="28" height="28" fill="#e8e8e8"/>
    <rect x="56" y="84" width="28" height="28" fill="#b0b0b0"/>
    <rect x="84" y="84" width="28" height="28" fill="#777"/>
    <text class="tiny" x="-2" y="138">token-patch reliability</text>
  </g>

  <!-- Bottom objective -->
  <rect class="red-panel" x="1190" y="500" width="948" height="332"/>
  <text class="panel-title" x="1228" y="540">(f) Reliability-aware Contrastive Optimization</text>
  <rect class="gray-dash" x="1230" y="570" width="315" height="218"/>
  <text class="sub-title" x="1282" y="606">Sample Weighting</text>
  <text class="math" x="1265" y="646">prior_i = 1, clean</text>
  <text class="math" x="1265" y="680">prior_i = conf(y_i*), noisy</text>
  <rect class="yellow-box" x="1282" y="710" width="210" height="42"/>
  <text class="label" x="1336" y="737">w_i update</text>

  <rect class="cyan-dash" x="1580" y="570" width="510" height="218"/>
  <text class="sub-title" x="1690" y="606">Global Alignment Objective</text>
  <g transform="translate(1620,632)">
    <circle class="node-o" cx="35" cy="35" r="14"/>
    <circle class="node-o" cx="82" cy="35" r="14"/>
    <circle class="node-o" cx="129" cy="35" r="14"/>
    <circle class="node-b" cx="35" cy="105" r="14"/>
    <circle class="node-b" cx="82" cy="105" r="14"/>
    <circle class="node-b" cx="129" cy="105" r="14"/>
    <line x1="35" y1="35" x2="35" y2="105" stroke="#2b8a3e" stroke-width="4"/>
    <line x1="82" y1="35" x2="82" y2="105" stroke="#2b8a3e" stroke-width="4"/>
    <line x1="129" y1="35" x2="129" y2="105" stroke="#2b8a3e" stroke-width="4"/>
    <line x1="35" y1="35" x2="82" y2="105" stroke="#cc3a35" stroke-width="2" stroke-dasharray="5 5"/>
    <line x1="129" y1="35" x2="82" y2="105" stroke="#cc3a35" stroke-width="2" stroke-dasharray="5 5"/>
  </g>
  <text class="math" x="1800" y="668">L = sum_i w_i prior_i L_NCE(v_i, t_i*)</text>
  <text class="math" x="1800" y="704">/ sum_i prior_i</text>
  <rect class="green-box" x="1798" y="735" width="220" height="40"/>
  <text class="label" x="1844" y="762">Robust Retrieval</text>

  <path class="arrow" d="M1138 690 C1170 690 1184 678 1229 678"/>
  <path class="arrow" d="M1485 355 C1510 496 1575 520 1645 570"/>
  <path class="arrow" d="M1940 428 C1940 492 1880 530 1835 570"/>
  <path class="arrow" d="M1545 680 L1579 680"/>

  <!-- cross panel routing -->
  <path class="arrow-red dash-arrow" d="M1942 456 C1940 472 1932 485 1920 500"/>
  <path class="arrow-blue dash-arrow" d="M1500 402 C1512 512 1155 510 1025 565"/>

  <!-- Figure legend -->
  <rect class="soft-box" x="50" y="850" width="2088" height="48"/>
  <circle class="node-o" cx="92" cy="874" r="10"/>
  <text class="small" x="110" y="880">image / visual tokens</text>
  <circle class="node-b" cx="286" cy="874" r="10"/>
  <text class="small" x="304" y="880">text / word tokens</text>
  <rect class="token-green" x="474" y="860" width="34" height="28"/>
  <text class="small" x="518" y="880">elite clean memory</text>
  <rect class="token-yellow" x="690" y="860" width="34" height="28"/>
  <text class="small" x="734" y="880">retrieved prototype</text>
  <line x1="930" y1="874" x2="990" y2="874" stroke="#111" stroke-width="3" marker-end="url(#arrow)"/>
  <text class="small" x="1004" y="880">forward training flow</text>
  <line x1="1205" y1="874" x2="1265" y2="874" stroke="#dd2929" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow-red)"/>
  <text class="small" x="1279" y="880">noisy rectification path</text>
  <text class="small" x="1590" y="880">RASC: robust association learning with semantic calibration</text>
</svg>
