<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950">
  <defs>
    <style>
      .bg { fill: #fbfbfd; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #172033; }
      .subtitle { font: 500 18px Arial, Helvetica, sans-serif; fill: #526071; }
      .section { font: 700 22px Arial, Helvetica, sans-serif; fill: #172033; }
      .label { font: 600 19px Arial, Helvetica, sans-serif; fill: #172033; }
      .small { font: 500 15px Arial, Helvetica, sans-serif; fill: #526071; }
      .tiny { font: 500 13px Arial, Helvetica, sans-serif; fill: #627084; }
      .math { font: 600 16px Arial, Helvetica, sans-serif; fill: #24324a; }
      .box { fill: #ffffff; stroke: #d8dde8; stroke-width: 2; rx: 14; }
      .box-blue { fill: #f2f7ff; stroke: #7aa7e8; stroke-width: 2.4; rx: 14; }
      .box-green { fill: #f0fbf5; stroke: #67b887; stroke-width: 2.4; rx: 14; }
      .box-amber { fill: #fff8ed; stroke: #e3a73c; stroke-width: 2.4; rx: 14; }
      .box-red { fill: #fff3f2; stroke: #df7770; stroke-width: 2.4; rx: 14; }
      .box-violet { fill: #f7f3ff; stroke: #9a7dde; stroke-width: 2.4; rx: 14; }
      .chip { fill: #ffffff; stroke: #d8dde8; stroke-width: 1.5; rx: 10; }
      .arrow { fill: none; stroke: #4f5f75; stroke-width: 2.6; marker-end: url(#arrow); }
      .arrow-blue { fill: none; stroke: #3478c6; stroke-width: 3; marker-end: url(#arrow-blue); }
      .arrow-green { fill: none; stroke: #2e8d5d; stroke-width: 3; marker-end: url(#arrow-green); }
      .arrow-red { fill: none; stroke: #c94b47; stroke-width: 3; marker-end: url(#arrow-red); }
      .dash { stroke-dasharray: 8 7; }
      .thin { stroke-width: 1.8; }
      .shadow { filter: url(#shadow); }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#172033" flood-opacity="0.09"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f5f75"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3478c6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e8d5d"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c94b47"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="950"/>

  <text class="title" x="70" y="64">Robust Association and Semantic Calibration for Noisy Image-Text Matching</text>
  <text class="subtitle" x="72" y="96">Framework overview: clean/noisy association estimation, high-confidence memory, noisy text rectification, and weighted global alignment.</text>

  <!-- Input block -->
  <rect class="box shadow" x="70" y="155" width="230" height="250"/>
  <text class="section" x="92" y="190">Noisy Training Pair</text>
  <rect x="100" y="220" width="82" height="70" rx="8" fill="#dfe8f8" stroke="#9eb6dc" stroke-width="2"/>
  <circle cx="125" cy="242" r="10" fill="#f3c968"/>
  <path d="M105 282 L132 257 L151 274 L171 250 L178 282 Z" fill="#7aa7e8"/>
  <rect x="196" y="220" width="72" height="70" rx="8" fill="#fff3f2" stroke="#df7770" stroke-width="2"/>
  <text class="tiny" x="209" y="247">noisy</text>
  <text class="tiny" x="209" y="267">caption</text>
  <path class="arrow thin" d="M183 255 L194 255"/>
  <text class="small" x="99" y="326">Image x_i</text>
  <text class="small" x="195" y="326">Text y_i</text>
  <text class="tiny" x="94" y="362">Injected or web-collected</text>
  <text class="tiny" x="94" y="382">mismatched associations</text>

  <!-- Encoders -->
  <rect class="box-blue shadow" x="390" y="135" width="285" height="135"/>
  <text class="section" x="420" y="172">Image Encoder</text>
  <text class="small" x="420" y="205">CLIP visual backbone</text>
  <text class="math" x="420" y="237">v_i = f_I(x_i)</text>

  <rect class="box-blue shadow" x="390" y="315" width="285" height="135"/>
  <text class="section" x="420" y="352">Text Encoder</text>
  <text class="small" x="420" y="385">CLIP textual backbone</text>
  <text class="math" x="420" y="417">t_i, T_i = f_T(y_i)</text>

  <path class="arrow-blue" d="M300 244 C330 244 350 202 389 202"/>
  <path class="arrow-blue" d="M300 306 C333 306 350 382 389 382"/>

  <!-- GMM split -->
  <rect class="box-amber shadow" x="760" y="160" width="300" height="250"/>
  <text class="section" x="790" y="196">GMM Clean/Noisy Split</text>
  <text class="small" x="790" y="229">Per-sample contrastive loss</text>
  <text class="math" x="790" y="258">l_i = L(v_i, t_i)</text>
  <rect class="chip" x="790" y="287" width="240" height="46"/>
  <text class="small" x="812" y="316">clean confidence p_i</text>
  <rect class="chip" x="790" y="345" width="240" height="46"/>
  <text class="small" x="812" y="374">label_hat: clean / noisy</text>
  <path d="M805 272 C835 248 875 248 905 272 C935 296 975 296 1010 272" fill="none" stroke="#e3a73c" stroke-width="3"/>
  <path d="M805 276 C840 324 880 326 915 292 C955 254 990 262 1010 285" fill="none" stroke="#df7770" stroke-width="3"/>

  <path class="arrow" d="M675 205 L759 245"/>
  <path class="arrow" d="M675 385 L759 326"/>

  <!-- Clean and noisy branches -->
  <rect class="box-green shadow" x="1135" y="125" width="345" height="185"/>
  <text class="section" x="1166" y="162">Elite Clean Selection</text>
  <text class="small" x="1166" y="195">Dynamic high-confidence filtering</text>
  <text class="math" x="1166" y="225">tau_dyn = mean(p_i | clean)</text>
  <text class="math" x="1166" y="253">elite if p_i &gt; tau_dyn + margin</text>
  <rect x="1170" y="272" width="270" height="16" rx="8" fill="#d9f2e4"/>
  <rect x="1170" y="272" width="196" height="16" rx="8" fill="#2e8d5d"/>

  <rect class="box-red shadow" x="1135" y="360" width="345" height="185"/>
  <text class="section" x="1166" y="397">Detected Noisy Samples</text>
  <text class="small" x="1166" y="430">Suspicious pairs are rectified</text>
  <text class="math" x="1166" y="460">y_i -> y_i*</text>
  <text class="small" x="1166" y="492">using semantic references from memory</text>

  <path class="arrow-green" d="M1060 240 C1094 218 1102 214 1134 214"/>
  <path class="arrow-red" d="M1060 335 C1096 380 1100 440 1134 440"/>
  <text class="tiny" x="1080" y="211">clean</text>
  <text class="tiny" x="1080" y="427">noisy</text>

  <!-- Memory bank -->
  <rect class="box-green shadow" x="700" y="535" width="385" height="220"/>
  <text class="section" x="733" y="572">High-Confidence Cross-Model Memory</text>
  <text class="small" x="733" y="606">FIFO queue with gradient detachment</text>
  <text class="math" x="733" y="638">Q = {(v_j, y_j)} from elite clean samples</text>
  <g transform="translate(733,664)">
    <rect x="0" y="0" width="48" height="48" rx="8" fill="#d9f2e4" stroke="#67b887" stroke-width="2"/>
    <rect x="58" y="0" width="48" height="48" rx="8" fill="#d9f2e4" stroke="#67b887" stroke-width="2"/>
    <rect x="116" y="0" width="48" height="48" rx="8" fill="#d9f2e4" stroke="#67b887" stroke-width="2"/>
    <rect x="174" y="0" width="48" height="48" rx="8" fill="#d9f2e4" stroke="#67b887" stroke-width="2"/>
    <rect x="232" y="0" width="48" height="48" rx="8" fill="#d9f2e4" stroke="#67b887" stroke-width="2"/>
    <text class="tiny" x="12" y="30">e1</text>
    <text class="tiny" x="70" y="30">e2</text>
    <text class="tiny" x="128" y="30">e3</text>
    <text class="tiny" x="186" y="30">...</text>
    <text class="tiny" x="244" y="30">ek</text>
  </g>
  <text class="tiny" x="733" y="738">Only trustworthy and up-to-date references are stored.</text>

  <path class="arrow-green" d="M1308 310 C1308 610 1120 645 1086 645"/>
  <text class="tiny" x="1260" y="640">enqueue elite clean</text>

  <!-- Retrieval and calibration -->
  <rect class="box-violet shadow" x="1135" y="615" width="345" height="225"/>
  <text class="section" x="1166" y="652">Noisy Text Rectification</text>
  <text class="small" x="1166" y="685">Retrieve top-k clean prototypes</text>
  <text class="math" x="1166" y="714">top-k = argmax sim(v_i, Q)</text>
  <text class="small" x="1166" y="747">Select best prototype and calibrate tokens</text>
  <text class="math" x="1166" y="776">r_m = max sim(T_m, visual patches)</text>
  <text class="math" x="1166" y="805">t_i* = weighted_pool(T*, r)</text>

  <path class="arrow-red" d="M1308 545 L1308 614"/>
  <path class="arrow-green dash" d="M1086 670 L1134 710"/>

  <!-- Training objective -->
  <rect class="box shadow" x="520" y="810" width="590" height="90"/>
  <text class="section" x="555" y="845">Weighted Global Contrastive Learning</text>
  <text class="math" x="555" y="875">L = sum_i w_i . prior_i . InfoNCE(v_i, t_i*) / sum_i prior_i</text>

  <path class="arrow" d="M1308 840 C1308 900 1124 870 1111 870"/>
  <path class="arrow" d="M532 450 C532 710 650 802 735 809"/>
  <path class="arrow" d="M532 270 C532 690 690 793 790 809"/>

  <!-- Inference note -->
  <rect class="box-blue" x="80" y="760" width="310" height="115"/>
  <text class="section" x="110" y="797">Inference</text>
  <text class="small" x="110" y="828">Use CLIP image/text encoders only</text>
  <text class="small" x="110" y="858">for bidirectional retrieval.</text>

  <path class="arrow-blue dash" d="M390 820 C470 800 510 782 555 746"/>

  <!-- Legend -->
  <rect class="chip" x="70" y="900" width="1460" height="1" opacity="0"/>
  <circle cx="90" cy="914" r="8" fill="#67b887"/>
  <text class="tiny" x="106" y="919">clean / reliable path</text>
  <circle cx="260" cy="914" r="8" fill="#df7770"/>
  <text class="tiny" x="276" y="919">noisy / rectification path</text>
  <circle cx="463" cy="914" r="8" fill="#e3a73c"/>
  <text class="tiny" x="479" y="919">probabilistic noise estimation</text>
  <circle cx="725" cy="914" r="8" fill="#9a7dde"/>
  <text class="tiny" x="741" y="919">prototype retrieval and token calibration</text>
</svg>
